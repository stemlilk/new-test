<!DOCTYPE HTML>
<html>
	<head>
		<title>樱花光影</title>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
		<link rel="stylesheet" href="assets/css/main.css" />
		<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
		<noscript><link rel="stylesheet" href="assets/css/noscript.css" /></noscript>
		<style>
			/* --- 1. 基础页面间距优化 --- */
			#main {
				background-color: transparent !important;
				border: none !important;
				box-shadow: none !important;
				padding: 0 !important;
				margin: 1.5rem auto 0 auto !important; 
				width: 100% !important;
			}

			.custom-box {
				width: 100% !important;
				max-width: 68rem !important;
				background: linear-gradient(to bottom, rgba(255, 255, 255, 0.8), rgba(255, 255, 255, 0.6)) !important;
				backdrop-filter: blur(15px);
				-webkit-backdrop-filter: blur(15px);
				border-radius: 50px !important;
				border: 1px solid rgba(255, 255, 255, 0.4) !important;
				box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1) !important;
				margin: 0 auto 3rem auto !important;
				padding: 5rem 4rem !important;
				min-height: 800px !important;
				box-sizing: border-box !important;
			}

			/* --- 2. 底部全宽长条播放器 (扁平化设计) --- */
			#music-container {
				position: fixed;
				bottom: 0;
				left: 0;
				width: 100%;
				z-index: 9999;
				display: flex;
				align-items: center;
				justify-content: space-between;
				padding: 0.6rem 2.5rem; /* 减小高度，更扁平 */
				background: rgba(255, 255, 255, 0.15) !important;
				backdrop-filter: blur(20px);
				-webkit-backdrop-filter: blur(20px);
				border-top: 1px solid rgba(255, 255, 255, 0.2);
				box-shadow: 0 -5px 25px rgba(0, 0, 0, 0.1);
				box-sizing: border-box;
			}

			.music-info {
				display: flex;
				align-items: center;
				gap: 15px;
				color: #fff;
				text-shadow: 0 1px 3px rgba(0,0,0,0.3);
				flex: 1;
			}

			.music-name {
				font-size: 0.85rem;
				font-weight: bold;
				white-space: nowrap;
			}

			#volume-display { 
				font-size: 0.7rem; 
				opacity: 0.8; 
				background: rgba(0,0,0,0.1);
				padding: 2px 8px;
				border-radius: 10px;
			}

			/* 音量滑块轨道 */
			.volume-slider-wrapper {
				flex: 2;
				display: flex;
				align-items: center;
				margin: 0 4rem;
			}

			#volume-slider {
				-webkit-appearance: none;
				width: 100%;
				height: 3px; /* 极细轨道 */
				background: rgba(255, 255, 255, 0.3) !important;
				border-radius: 10px;
				outline: none;
				cursor: pointer;
			}

			/* 滑块圆点 */
			#volume-slider::-webkit-slider-thumb {
				-webkit-appearance: none;
				width: 12px;
				height: 12px;
				background: #fff !important; 
				border-radius: 50%;
				box-shadow: 0 0 8px rgba(0,0,0,0.3);
			}

			/* 播放控制按钮 */
			#music-btn {
				background: rgba(255, 255, 255, 0.9);
				border: none;
				width: 34px !important;
				height: 34px !important;
				border-radius: 50% !important; 
				cursor: pointer;
				display: flex;
				align-items: center;
				justify-content: center;
				color: #333;
				padding: 0 !important;
				flex-shrink: 0;
				box-shadow: 0 2px 8px rgba(0,0,0,0.1);
				transition: transform 0.2s ease;
			}

			#music-btn:hover { transform: scale(1.1); }

			#music-btn i {
				font-size: 14px !important;
				display: block !important;
				line-height: 1 !important;
			}

			/* 旋转动画 */
			.rotating { animation: rotate 5s linear infinite; }
			@keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

			/* 社交图标颜色保持 */
			#nav .icons li a { border-bottom: none !important; }
			.fa-x-twitter { color: #000000 !important; }
			.fa-facebook-f { color: #1877F2 !important; }
			.fa-github { color: #333333 !important; }
		</style>
	</head>
	<body class="is-preload">
		<div id="wrapper" class="fade-in">
			<div id="intro">
				<h1>Hello!<br />欢迎来到我的角落</h1>
				<p>让金灿的光影留下独属于它们的痕迹。</p>
				<ul class="actions">
					<li><a href="#header" class="button icon solid solo fa-arrow-down scrolly">Continue</a></li>
				</ul>
			</div>

			<header id="header">
				<a href="index.html" class="logo">樱花光影</a>
			</header>

			<nav id="nav">
				<ul class="links">
					<li class="active"><a href="index.html">首页</a></li>
				</ul>
				<ul class="icons">
					<li><a href="https://x.com/stem1110327" class="icon brands fa-x-twitter" target="_blank"><span class="label">Twitter</span></a></li>
					<li><a href="https://www.facebook.com/profile.php?id=61556834794261" class="icon brands fa-facebook-f" target="_blank"><span class="label">Facebook</span></a></li>
					<li><a href="https://github.com/stemlilk" class="icon brands fa-github" target="_blank"><span class="label">GitHub</span></a></li>
				</ul>
			</nav>

			<div id="main">
				<section class="custom-box">
					<header class="major">
						<h2>主要内容区域</h2>
					</header>
					<p>欢迎访问！左下角有音乐播放哦！</p>
					<div style="height: 500px;"></div>
				</section>
			</div>

			<div id="music-container">
				<div class="music-info">
					<span class="music-name">鸣潮先约电台</span>
					<span id="volume-display">音量: 50%</span>
				</div>
				
				<div class="volume-slider-wrapper">
					<input type="range" id="volume-slider" min="0" max="100" value="50">
				</div>

				<audio id="bgm" loop>
					<source src="music/鸣潮先约电台 _ jixwang _ Tarokiki _ Emi Evans - 远航星的告别_L.ogg" " type="audio/ogg">
				</audio>

				<button id="music-btn" onclick="toggleMusic()">
					<i id="music-icon" class="fa-solid fa-play"></i>
				</button>
			</div>

			<div style="text-align: center; padding: 4rem 0; color: rgba(255,255,255,0.5);">
				&copy; 樱花光影
			</div>
		</div>

		<script src="assets/js/jquery.min.js"></script>
		<script src="assets/js/jquery.scrollex.min.js"></script>
		<script src="assets/js/jquery.scrolly.min.js"></script>
		<script src="assets/js/browser.min.js"></script>
		<script src="assets/js/breakpoints.min.js"></script>
		<script src="assets/js/util.js"></script>
		<script src="assets/js/main.js"></script>

		<script>
			const audio = document.getElementById('bgm');
			const btn = document.getElementById('music-btn');
			const icon = document.getElementById('music-icon');
			const volumeSlider = document.getElementById('volume-slider');
			const volumeDisplay = document.getElementById('volume-display');

			audio.volume = 0.5;

			// 音量调节逻辑
			volumeSlider.addEventListener('input', function() {
				const val = this.value;
				audio.volume = val / 100;
				volumeDisplay.innerText = `音量: ${val}%`;
			});

			// 播放/暂停切换
			function toggleMusic() {
				if (audio.paused) {
					audio.play();
					icon.className = 'fa-solid fa-pause';
					btn.classList.add('rotating');
				} else {
					audio.pause();
					icon.className = 'fa-solid fa-play';
					btn.classList.remove('rotating');
				}
			}

			// 尝试自动播放逻辑
			window.addEventListener('load', () => {
				audio.play().then(() => {
					icon.className = 'fa-solid fa-pause';
					btn.classList.add('rotating');
				}).catch(() => {
					// 浏览器拦截后，用户点击页面即开始播放
					document.addEventListener('click', () => {
						if(audio.paused) toggleMusic();
					}, { once: true });
				});
			});
		</script>
	</body>
</html>
